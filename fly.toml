app = "dba-changeops-ai-workbench"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  LLM_BASE_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1"
  LLM_MODEL = "qwen-plus"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"
