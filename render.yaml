services:
  - type: web
    name: dba-changeops-ai-workbench
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: LLM_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: qwen-plus
      - key: ITSM_WEBHOOK_URL
        sync: false
      - key: ITSM_WEBHOOK_TOKEN
        sync: false
